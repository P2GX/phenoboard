name: Build Tauri App for All Platforms

on:
  push:
    tags:
      - 'v*' 
      - '[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Build and Release
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Frontend
        # Added --base-href ./ to match your package.json build script
        run: npm run build -- --configuration=production --base-href ./

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY || '' }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD || '' }}
        with:
          # This automatically creates/updates the release and uploads the .msi, .dmg, .deb, etc.
          tagName: ${{ github.ref_name }}
          releaseName: "Phenoboard v__VERSION__"
          includeChangelog: true
          releaseDraft: true
          prerelease: false