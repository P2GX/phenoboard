<dialog #nativeMappingDialog class="hpo-modal" (cancel)="cancel()">
  <div class="modal-content">
    <header class="modal-header">
      <h3>Map Value Symbols for: {{ header() }}</h3>
      <button class="close-btn" type="button" (click)="cancel()">&times;</button>
    </header>
    
    <main class="modal-body">
      <p class="hpo-badge">Target Term: <strong>{{ hpoLabel() }}</strong> <code>{{ hpoId() }}</code></p>
      <p class="instruction-text">Specify how each unique raw cell string maps to this phenotype concept state:</p>
      
      <div class="mapping-grid">
        @for (value of uniqueValues(); track value) {
          <div class="mapping-card">
            <div class="card-header">
              <span class="raw-value" [title]="value">{{ value || '(Empty String)' }}</span>
            </div>
            
            <div class="tile-options-group">
              <button 
                type="button"
                class="tile-btn observed-tile"
                [class.active]="valueToStateMap[value] === 'observed'"
                (click)="valueToStateMap[value] = 'observed'">
                <span class="tile-icon">✓</span>
                <span class="tile-label">Observed</span>
              </button>

              <button 
                type="button"
                class="tile-btn excluded-tile"
                [class.active]="valueToStateMap[value] === 'excluded'"
                (click)="valueToStateMap[value] = 'excluded'">
                <span class="tile-icon">✕</span>
                <span class="tile-label">Excluded</span>
              </button>

              <button 
                type="button"
                class="tile-btn na-tile"
                [class.active]="valueToStateMap[value] === 'notApplicable'"
                (click)="valueToStateMap[value] = 'notApplicable'">
                <span class="tile-icon">−</span>
                <span class="tile-label">N/A</span>
              </button>
            </div>
          </div>
        }
      </div>
    </main>
    
    <footer class="modal-footer">
      <button class="btn-secondary" type="button" (click)="cancel()">Cancel</button>
      <button class="btn-primary" type="button" (click)="confirm()">Apply Transformation</button>
    </footer>
  </div>
</dialog>
