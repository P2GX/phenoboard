<div class="native-modal-backdrop" (click)="onBackdropClick($event)">
  <div class="native-modal-container" (click)="$event.stopPropagation()">
    
    <header class="modal-header">
      <div class="header-title">
        <mat-icon>science</mat-icon>
        <span>HPO Text Mining</span>
      </div>
      <button class="close-icon-btn" (click)="close()">×</button>
    </header>

    <main class="modal-body">
      @if(step === 1) {
        <app-hpomining
          (success)="onTextMiningSuccess($event)"
          (cancel)="close()">
        </app-hpomining>
      } @else if (step === 2) {
        <app-hpopolishing
          [annotations]="annotations"
          (done)="onPolishingDone($event)">
        </app-hpopolishing>
      }
    </main>

    <footer class="modal-footer">
      <button class="btn-secondary" (click)="close()">Cancel</button>
      @if (step === 2) {
        <button class="btn-primary" (click)="polishingComp.finish()">Finish</button>
      }
    </footer>
    
  </div>
</div>
