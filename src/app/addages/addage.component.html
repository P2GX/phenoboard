<h2 mat-dialog-title class="dialog-title">Select Age</h2>

<mat-dialog-content class="age-dialog-content">
  <div class="dialog-stack">
    
    <div class="selection-section">
      <label class="section-label">Choose Existing</label>
      <div class="age-tag-cloud">
        @for (term of existingAgeStrings(); track term) {
          <button 
            type="button"
            (click)="selectExisting(term)"
            class="age-tag">
            {{ term }}
          </button>
        }
      </div>
    </div>

    <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">OR CREATE NEW</span>
        <div class="divider-line"></div>
    </div>

    <div class="manual-entry">
      <mat-form-field appearance="outline" class="flex-grow dense-field">
        <mat-label>New Age String</mat-label>
        <input matInput 
               [ngModel]="customAge()" 
               (ngModelChange)="customAge.set($event)"
               [matAutocomplete]="auto"
               (keyup.enter)="createNewAge()"
               placeholder="e.g. P35Y">
      </mat-form-field>
      <mat-autocomplete #auto="matAutocomplete" (optionSelected)="selectExisting($event.option.value)">
            @for (term of filteredTerms(); track term) {
              <mat-option [value]="term">{{ term }}</mat-option>
            }
        </mat-autocomplete>
      
      <button class="btn-outline-primary"
              (click)="createNewAge()" 
              [disabled]="!customAge()">
        Use
      </button>
    </div>

  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="!dialog-footer">
  <button mat-button (click)="onCancel()" class="btn-outline-cancel">Cancel</button>
</mat-dialog-actions>
