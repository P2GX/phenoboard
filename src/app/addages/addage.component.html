<!-- addage.component.html -->
<div class="age-wizard-container">
  <h2 class="wizard-title">Set Age Value</h2>

  <div class="wizard-body">
    <!-- Section A: Quick Select from previously used terms -->
    @if (existingAgeStrings().length > 0) {
      <div class="quick-select-section">
        <label class="section-label">Recently Used Ages</label>
        <div class="tag-cloud">
          @for (term of existingAgeStrings(); track term) {
            <button type="button" class="tag-btn" (click)="selectExisting(term)">
              {{ term }}
            </button>
          }
        </div>
      </div>
    }

    <!-- Section B: Standard text entry box with ambient lookup matching -->
    <div class="input-section">
      <label for="age-search" class="section-label">Enter Age String</label>
      <div class="search-wrapper">
        <input
          id="age-search"
          type="text"
          class="form-control text-input-look"
          placeholder="e.g., P32Y, P25Y, G38w2d"
          [(ngModel)]="customAge"
          list="age-suggestions"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />

        <!-- Ambient browser suggestions dropdown list -->
        <datalist id="age-suggestions">
          @for (suggested of filteredTerms(); track suggested) {
            <option [value]="suggested"></option>
          }
        </datalist>
      </div>
      <span class="format-hint"
        >Type any age term (e.g., Adult onset), custom ISO8601 pattern (P[Y][M][D]), or Gestational
        value (G[w][d]).</span
      >
    </div>
  </div>

  <div class="wizard-footer">
    <button type="button" class="btn btn-outline" (click)="onCancel()">Cancel</button>
    <button
      type="button"
      class="btn btn-primary"
      [disabled]="!customAge().trim()"
      (click)="createNewAge()"
    >
      Apply Age
    </button>
  </div>
</div>
